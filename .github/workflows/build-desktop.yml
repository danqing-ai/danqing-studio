name: Build macOS Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Required to attach .dmg files to GitHub Releases (not only Actions artifacts).
permissions:
  contents: write

jobs:
  build-desktop:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        run: |
          rustup target add aarch64-apple-darwin

      - name: Create venv & install dependencies
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build desktop bundle
        run: |
          source .venv/bin/activate
          make desktop-bundle

      - name: Verify DMG was produced
        run: |
          ls -la out/desktop/bundle/
          ls -la out/desktop/bundle/dmg/
          test -n "$(find out/desktop/bundle/dmg -maxdepth 1 -name '*.dmg' -print -quit)"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: danqing-desktop-macos
          path: |
            out/desktop/bundle/dmg/*.dmg
            out/desktop/bundle/macos/*.app
          if-no-files-found: error

      - name: Attach DMG to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: out/desktop/bundle/dmg/*.dmg
          fail_on_unmatched_files: true
