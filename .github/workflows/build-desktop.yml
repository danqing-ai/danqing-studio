name: Build macOS Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Desktop bundle semver (e.g. 0.2.0). Leave empty to keep repo default.
        required: false
        type: string

# Required to attach .dmg files to GitHub Releases (not only Actions artifacts).
permissions:
  contents: write

jobs:
  build-desktop:
    runs-on: macos-latest
    steps:
      - name: Checkout Studio
        uses: actions/checkout@v4
        with:
          path: danqing-studio

      - name: Checkout dq-ui
        uses: actions/checkout@v4
        with:
          repository: danqing-ai/dq-ui
          path: dq-ui

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        run: |
          rustup target add aarch64-apple-darwin

      - name: Create venv & install dependencies
        working-directory: danqing-studio
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Set desktop version from tag
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: danqing-studio
        run: python3 scripts/set_desktop_version.py "${GITHUB_REF_NAME#v}"

      - name: Set desktop version (manual dispatch)
        if: github.event_name == 'workflow_dispatch' && inputs.version != ''
        working-directory: danqing-studio
        run: python3 scripts/set_desktop_version.py "${{ inputs.version }}"

      - name: Build desktop bundle
        working-directory: danqing-studio
        run: |
          source .venv/bin/activate
          make desktop-bundle

      - name: Verify DMG was produced
        working-directory: danqing-studio
        run: |
          ls -la out/desktop/bundle/
          ls -la out/desktop/bundle/dmg/
          test -n "$(find out/desktop/bundle/dmg -maxdepth 1 -name '*.dmg' -print -quit)"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: danqing-desktop-macos
          path: |
            danqing-studio/out/desktop/bundle/dmg/*.dmg
            danqing-studio/out/desktop/bundle/macos/*.app
          if-no-files-found: error

      - name: Attach DMG to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: danqing-studio/out/desktop/bundle/dmg/*.dmg
          fail_on_unmatched_files: true
