name: Build Release Artifacts

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Release version label (e.g. 0.2.0). Used for desktop semver and Linux tar name.
        required: false
        type: string

# Required to attach release assets (not only Actions artifacts).
permissions:
  contents: write

jobs:
  build-desktop:
    name: macOS desktop (MLX)
    runs-on: macos-latest
    steps:
      - name: Checkout Studio
        uses: actions/checkout@v6
        with:
          path: danqing-studio

      - name: Checkout dq-ui
        uses: actions/checkout@v6
        with:
          repository: danqing-ai/dq-ui
          path: dq-ui

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dq-ui dependencies
        run: |
          npm install
        working-directory: ${{ github.workspace }}/dq-ui/packages/tokens
      - name: Install dq-ui ui
        run: npm install
        working-directory: ${{ github.workspace }}/dq-ui/packages/ui
      - name: Install dq-ui shell
        run: npm install
        working-directory: ${{ github.workspace }}/dq-ui/packages/shell

      - name: Setup Rust
        run: rustup target add aarch64-apple-darwin

      - name: Create venv and install dependencies
        working-directory: danqing-studio
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Set release version
        working-directory: danqing-studio
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          elif [[ -n "${{ inputs.version }}" ]]; then
            echo "RELEASE_VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_VERSION=$(git describe --tags --always --dirty)" >> "$GITHUB_ENV"
          fi

      - name: Set desktop version from tag
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: danqing-studio
        run: python3 scripts/set_desktop_version.py "${GITHUB_REF_NAME#v}"

      - name: Set desktop version (manual dispatch)
        if: github.event_name == 'workflow_dispatch' && inputs.version != ''
        working-directory: danqing-studio
        run: python3 scripts/set_desktop_version.py "${{ inputs.version }}"

      - name: Build desktop bundle (MLX sidecar)
        working-directory: danqing-studio
        env:
          DANQING_PYINSTALLER_PROFILE: mlx
        run: |
          source .venv/bin/activate
          make pack-macos-desktop

      - name: Verify DMG was produced
        working-directory: danqing-studio
        run: |
          ls -la out/desktop/bundle/
          ls -la out/desktop/bundle/dmg/
          test -n "$(find out/desktop/bundle/dmg -maxdepth 1 -name '*.dmg' -print -quit)"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v6
        with:
          name: danqing-desktop-macos
          path: |
            danqing-studio/out/desktop/bundle/dmg/*.dmg
            danqing-studio/out/desktop/bundle/macos/*.app
          if-no-files-found: error

  build-linux-cuda:
    name: Linux CUDA server (tar.gz)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Studio
        uses: actions/checkout@v6
        with:
          path: danqing-studio

      - name: Checkout dq-ui
        uses: actions/checkout@v6
        with:
          repository: danqing-ai/dq-ui
          path: dq-ui

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dq-ui dependencies
        run: npm install
        working-directory: ${{ github.workspace }}/dq-ui/packages/tokens
      - name: Install dq-ui ui
        run: npm install
        working-directory: ${{ github.workspace }}/dq-ui/packages/ui
      - name: Install dq-ui shell
        run: npm install
        working-directory: ${{ github.workspace }}/dq-ui/packages/shell

      - name: Set release version
        working-directory: danqing-studio
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          elif [[ -n "${{ inputs.version }}" ]]; then
            echo "RELEASE_VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_VERSION=$(git describe --tags --always --dirty)" >> "$GITHUB_ENV"
          fi

      - name: Create venv and install CUDA dependencies
        working-directory: danqing-studio
        env:
          TORCH_INDEX_URL: https://download.pytorch.org/whl/cu124
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          make pack-linux-server-venv TORCH_INDEX_URL="$TORCH_INDEX_URL"

      - name: Build Linux CUDA tar.gz
        working-directory: danqing-studio
        env:
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
          DANQING_PYINSTALLER_PROFILE: cuda
        run: |
          source .venv/bin/activate
          make pack-linux-server-archive RELEASE_VERSION="$RELEASE_VERSION"

      - name: Verify tar.gz was produced
        working-directory: danqing-studio
        run: |
          ls -la out/dist/
          test -f "out/dist/danqing-studio-linux-cuda-x86_64-${RELEASE_VERSION}.tar.gz"

      - name: Upload Linux CUDA artifact
        uses: actions/upload-artifact@v6
        with:
          name: danqing-linux-cuda
          path: danqing-studio/out/dist/danqing-studio-linux-cuda-x86_64-*.tar.gz
          if-no-files-found: error

  build-windows-desktop:
    name: Windows desktop (CUDA)
    runs-on: windows-latest
    steps:
      - name: Checkout Studio
        uses: actions/checkout@v6
        with:
          path: danqing-studio

      - name: Checkout dq-ui
        uses: actions/checkout@v6
        with:
          repository: danqing-ai/dq-ui
          path: dq-ui

      - name: Setup Python
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      # dq-ui deps: installed in "Build frontend" via file:../../dq-ui (npm --prefix is flaky on Windows).
      - name: Verify dq-ui checkout
        run: |
          if (-not (Test-Path "${{ github.workspace }}/dq-ui/packages/ui/package.json")) {
            Get-ChildItem "${{ github.workspace }}" | Format-Table Name
            throw "dq-ui checkout missing"
          }

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Set release version
        working-directory: danqing-studio
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $ver = $env:GITHUB_REF_NAME.TrimStart('v')
          } elseif ('${{ inputs.version }}' -ne '') {
            $ver = '${{ inputs.version }}'
          } else {
            $ver = (git describe --tags --always --dirty).TrimStart('v')
          }
          "RELEASE_VERSION=$ver" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Create Python venv
        working-directory: danqing-studio
        run: |
          & "${{ steps.setup-python.outputs.python-path }}" -m venv .venv
          .\.venv\Scripts\python.exe -V

      - name: Install CUDA Python dependencies
        working-directory: danqing-studio
        timeout-minutes: 45
        env:
          TORCH_INDEX_URL: https://download.pytorch.org/whl/cu124
        run: |
          .\.venv\Scripts\Activate.ps1
          python -m pip install --upgrade pip
          python -m pip install torch torchvision --index-url $env:TORCH_INDEX_URL
          python -m pip install -r requirements-linux-cuda.txt pyinstaller

      - name: Set desktop version from tag
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: danqing-studio
        run: |
          .\.venv\Scripts\Activate.ps1
          python scripts/set_desktop_version.py "$($env:GITHUB_REF_NAME.TrimStart('v'))"

      - name: Set desktop version (manual dispatch)
        if: github.event_name == 'workflow_dispatch' && inputs.version != ''
        working-directory: danqing-studio
        run: |
          .\.venv\Scripts\Activate.ps1
          python scripts/set_desktop_version.py "${{ inputs.version }}"

      - name: Build frontend
        working-directory: danqing-studio/frontend
        run: |
          npm install --no-audit --no-fund
          npm run build

      - name: Build Windows desktop bundle (CUDA sidecar)
        working-directory: danqing-studio
        env:
          DANQING_PYINSTALLER_PROFILE: cuda
        run: |
          .\.venv\Scripts\Activate.ps1
          python scripts/build_sidecar.py
          python scripts/tauri_build.py --platform windows

      - name: Verify NSIS installer was produced
        working-directory: danqing-studio
        run: |
          Get-ChildItem out/desktop/bundle -ErrorAction SilentlyContinue | Format-Table Name
          $exe = Get-ChildItem out/desktop/bundle -Recurse -Include '*-setup.exe','*.exe' -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $exe) { throw 'No installer .exe under out/desktop/bundle' }

      - name: Upload Windows desktop artifact
        uses: actions/upload-artifact@v6
        with:
          name: danqing-desktop-windows
          path: |
            danqing-studio/out/desktop/bundle/nsis/*.exe
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-desktop, build-linux-cuda, build-windows-desktop]
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v6
        with:
          name: danqing-desktop-macos
          path: release-assets/macos

      - name: Download Linux CUDA artifact
        uses: actions/download-artifact@v6
        with:
          name: danqing-linux-cuda
          path: release-assets/linux

      - name: Download Windows desktop artifact
        uses: actions/download-artifact@v6
        with:
          name: danqing-desktop-windows
          path: release-assets/windows

      - name: Attach assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/macos/**/*.dmg
            release-assets/linux/**/*.tar.gz
            release-assets/windows/**/*.exe
          fail_on_unmatched_files: true
